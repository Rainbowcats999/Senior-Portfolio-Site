<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Elizabeth Rizov</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-shell">
    <div class="page-panel contact-panel">
      <header class="topbar">
        <a class="brand" href="index.html">ELIZABETH RIZOV</a>
        <nav class="top-nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="projects.html">Projects</a>
          <a href="resume.html">Resume</a>
          <a class="active" href="contact.html">Contact</a>
        </nav>
        <div class="mode-tools" aria-label="Display controls">
          <button type="button" title="Light mode">&#9788;</button>
        </div>
      </header>

      <main class="content contact-layout">
        <section class="contact-copy">
          <h1>Let's Connect</h1>
          <p>I'm open to new opportunities, collaborations, and exciting projects. Feel free to reach out!</p>

          <div class="contact-list">
            <div>
              <span>&#9993;</span>
              <strong>Email</strong>
              <a href="mailto:elizabethrizov.dev@gmail.com">elizabethrizov.dev@gmail.com</a>
            </div>
            <div>
              <span>&#9742;</span>
              <strong>Phone</strong>
              <a href="tel:+12314567890">(231) 456-7890</a>
            </div>
            <div>
              <span>&#9671;</span>
              <strong>Location</strong>
              <p>Marlboro, NJ, USA</p>
            </div>
          </div>

          <div class="social-row">
            <p>Socials</p>
            <a href="#">gh</a>
            <a href="#">in</a>
            <a href="#">ig</a>
            <a href="#">tw</a>
          </div>
        </section>

        <aside class="message-card">
          <h2>Send Me a Message</h2>
          <form id="contact-form">
            <label>
              <span>Your Name</span>
              <input name="name" type="text" autocomplete="name" required>
            </label>
            <label>
              <span>Your Email</span>
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              <span>Subject</span>
              <input name="subject" type="text" required>
            </label>
            <label>
              <span>Your Message</span>
              <textarea name="message" rows="7" required></textarea>
            </label>
            <button class="btn primary" type="submit">Send Message</button>
          </form>
        </aside>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
