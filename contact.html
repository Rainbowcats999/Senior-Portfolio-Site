<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Elizabeth Rizov</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="logo">ER</div>
      <nav class="side-links" aria-label="Sidebar">
        <a class="side-btn" href="index.html" title="Home">🏠</a>
        <a class="side-btn" href="about.html" title="About">👤</a>
        <a class="side-btn" href="projects.html" title="Projects">💼</a>
        <a class="side-btn" href="resume.html" title="Resume">📄</a>
        <a class="side-btn active" href="contact.html" title="Contact">✉️</a>
      </nav>
      <div class="side-footer">
        <button class="icon-btn" title="Theme">⚙️</button>
      </div>
    </aside>

    <div class="main-panel">
      <header class="panel-header">
        <div class="panel-left"><div class="name">ELIZABETH RIZOV</div></div>
        <nav class="top-nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="projects.html" class="nav-link">Projects</a>
          <a href="resume.html" class="nav-link">Resume</a>
          <a href="contact.html" class="nav-link active">Contact</a>
        </nav>
        <div class="panel-right"><button class="icon-btn">⚙️</button></div>
      </header>

      <main class="panel-content">
        <section class="contact-page">
          <h1>Let's Connect</h1>
          <div class="contact-columns">
            <div class="contact-left">
              <p>Email: <a href="mailto:hello@elizabeth.dev">hello@elizabeth.dev</a></p>
              <p>Phone: (123) 456-7890</p>
              <p>Location: New York, USA</p>
            </div>
            <aside class="contact-right">
              <form id="contact-form">
                <label><input name="name" placeholder="Your Name" required></label>
                <label><input name="email" type="email" placeholder="Your Email" required></label>
                <label><textarea name="message" rows="5" placeholder="Your Message" required></textarea></label>
                <button class="btn btn-primary" type="submit">SEND MESSAGE</button>
              </form>
            </aside>
          </div>
        </section>
      </main>

      <footer class="panel-footer">Designed &amp; Built by Elizabeth Rizov</footer>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
